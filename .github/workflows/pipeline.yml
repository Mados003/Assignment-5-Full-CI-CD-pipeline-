name: Assignment 5 Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Optional accuracy override (0.80 fail, 0.90 pass)"
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      FORCE_ACCURACY: ${{ github.event.inputs.force_accuracy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y pathspec || true
          pip install --no-cache-dir -r requirements.txt
          pip check
      - name: Debug and normalize DVC remote path in CI
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "DVC config:"
          cat .dvc/config
          echo "Remote files present?"
          ls -R dvc_remote || true
          dvc remote modify localremote url "$GITHUB_WORKSPACE/dvc_remote"
          echo "DVC config after override:"
          cat .dvc/config
      - name: Pull data with DVC
        run: |
          dvc pull -v

      - name: Train model and log to MLflow
        run: |
          python train.py

      - name: Verify model_info.txt exists
        run: |
          test -f model_info.txt
          echo "model_info.txt created with Run ID: $(cat model_info.txt)"

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Check threshold in MLflow
        run: |
          python check_threshold.py --model-info-path model_info.txt --threshold 0.85

      - name: Mock Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"

      - name: Optional Docker build with RUN_ID
        run: |
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t assignment5-model:latest .